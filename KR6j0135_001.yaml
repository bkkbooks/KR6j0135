body:
  text: 文稽首至是故常歸命讚曰此八頌初五句有五謂一於初句言普賢者是理也即是為一字攝在下諸佛故或分為二佛謂普賢與諸佛轉輪王是也或分為三佛先二加現證大菩提是也或分作四智謂普賢者是大圓鏡智即阿閦佛次一句妙觀察即阿彌陀佛也次一句平等性智即寶生佛也為轉教敕輪一句成所作智即不空成就佛是或分作五智先四加法界體性智所謂受名金剛界一句是也自此下句配四方并中胎毗盧舍那佛也從自頂流出大金剛明王二句東方佛也威光至圍繞二句南方佛為一切至輪王二句西佛才現至皆歿北佛至一體故中體佛也次二句東佛次二句南佛次二句西佛次二中體佛成佛至同虛空北方佛也次一中體佛次二東佛次二西佛令頓一句南佛是故常歸命一北方佛也今別釋文音義也爍音釋河河也飢須留令善也故實也纂衣良布揀可爾反族姓四姓也騎妓伊反乃留驀婆句反川萬太久䓻許其反葷鬼爾反滌知益反止良加須磨須留拭志憶反川波久曼荼羅梵語此云壇也珮波伊反川於布毛乃噉布久無瑜伽梵語此云相應滑果和反奈太良爾側祖波無押於須鋒鋭上止加利下止志素月上白也拇於保由比拄左左布剋能也額比太比音加久反腕太布左江牟反腿布都毛毛腦後千奈久保股毛毛叉阿左布䏶比左美口也悉地此云成就繖左爾反川加左嬋娟上禪反下捐反太乎也加奈留狀也劇甚也調志良部修者奈止止微無也盤和加奴搯取也由猶也冤蒬反阿太晨阿志太午馬時昏由布戶暮油布戶燼毛江久比洽阿萬子久鎮於久搜阿奈久留間左加布䐡保祖馝鄙列反馞保沒反師川伊久左帥音水伊川伊久左公臺以土高作此云臺閣以木高搆云爾形服與祖比一字頂輪次第將往堂而手口淨了到室結坐三密印所謂以字手三遍舌三遍心密三遍誦了次以囕字淨身及處皆燒淨了次以佛部心印於頂三誦次以蓮華部心印上右大指就右耳處三誦次以金剛部心印上左大指就左耳處三誦了次無能勝印加持了然後作往堂儀謂我身金剛薩埵等思之然後入堂禮佛燒香塗香三部印作了次普禮印言立右足誦云歸命等四無量觀菩提心言印無能勝結護言印三解脫觀五相觀本尊本真言印又名一字頂輪密言大日三字密言亦名御身密言灌頂言印供養言印讚印獻閼伽佛眼言印又智拳本言謂頂輪印又加此作御身印雖爾先作本言印觀本尊及眷屬各以二印印四處念珠言印念誦數了次本言加持印四處又加御身印也然後作定印入觀觀字義及月輪種等出了本言加持重加三字加持讚言印供養印言數如前二十一遍閼伽歸命等無能解界但一遍左旋解之解脫印言前三部心印了數如前天明三丙午十月三日於仁和寺皆明寺以栂尾山法鼓臺藏本寫得之訖智積院僧東武慈忍享和改元辛酉年秋八月初六夜求右本寫之此音義者和人施於和之音訓是故其反切等有難通而魯魚之差不少今挍正點國字以壽梓于時同年冬十月和州豐初瀨山總持院快道志一挍了慈順
